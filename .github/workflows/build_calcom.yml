name: Build cal.com (amd64, bookworm)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      NODE_OPTIONS: "--max_old_space_size=8192"
      CALENDSO_ENCRYPTION_KEY: ${{ secrets.CALENDSO_ENCRYPTION_KEY }}
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXT_PUBLIC_WEBAPP_URL: "http://localhost:3000"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_TELEMETRY_DISABLED: "1"
      TURBO_TELEMETRY_DISABLED: "1"

    container:
      image: debian:bookworm

    steps:
      - name: Install system deps
        run: |
          apt-get update
          apt-get install -y curl git build-essential python3

      - name: Install Node.js (LTS)
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Checkout cal.com
        uses: actions/checkout@v4
        with:
          repository: calcom/cal.com
          ref: main
      
      - name: Generate dynamic keys (masked)
        id: keygen
        run: |
          # Generate random 32-byte base64 keys
          CAL_KEY=$(openssl rand -base64 32)
          NEXT_KEY=$(openssl rand -base64 32)

          # Mask the keys in GitHub Actions logs
          echo "::add-mask::$CAL_KEY"
          echo "::add-mask::$NEXT_KEY"

          # Export the keys to subsequent steps
          echo "CALENDSO_ENCRYPTION_KEY=$CAL_KEY" >> $GITHUB_ENV
          echo "NEXTAUTH_SECRET=$NEXT_KEY" >> $GITHUB_ENV

      - name: Install dependencies (Yarn)
        run: yarn install --immutable

      - name: Generate Prisma client
        run: yarn prisma generate

      - name: Build app
        run: yarn build

      - name: Disable postinstall in CI
        run: |
          echo "Patching package.json to comment out postinstall..."
          # backup original package.json
          cp package.json package.json.bak
          # comment out the postinstall line
          sed -i 's/"postinstall": "husky install && turbo run post-install"/"postinstall": ""/g' package.json

      - name: Prune dev dependencies
        run: yarn workspaces focus --all --production

      - name: Prepare artifact
        run: |
          mkdir -p /build
          cp -r . /build/app
          tar -czf calcom-bookworm-amd64.tar.gz -C /build app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: calcom-bookworm-amd64
          path: calcom-bookworm-amd64.tar.gz
