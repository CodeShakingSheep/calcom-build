name: Build cal.com (amd64, bookworm)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

  schedule:
    - cron: '0 2 * * *'

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      calcom_version:  ${{ steps.get-versions.outputs.calcom_version }}
      node_version:    ${{ steps.get-versions.outputs.node_version }}
      yarn_version:    ${{ steps.get-versions.outputs.yarn_version }}
      should_build:    ${{ steps.check-version.outputs.should_build }}

      install_dir:     /var/www/calcom

    steps:
      - name: Get upstream versions
        id: get-versions
        shell: bash
        run: |
          set -euo pipefail
          CALCOM_VERSION=$(curl -sIL https://github.com/calcom/cal.com/releases/latest \
            | grep -i location | sed -n 's@.*/tag/v\([^"]*\).*@\1@p' | tr -d '\r[:space:]')
          echo "calcom_version=$CALCOM_VERSION" >> $GITHUB_OUTPUT

          NODE_VERSION=$(curl -s https://raw.githubusercontent.com/calcom/cal.com/refs/heads/main/Dockerfile \
            | sed -nE 's@.*node:([0-9]+(\.[0-9]){0,2}).*@\1@p' | head -n1)
          echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT

          YARN_VERSION=$(curl -s https://raw.githubusercontent.com/calcom/cal.com/refs/heads/main/package.json \
            | jq -r '.packageManager | split("@")[1] | split(".")[0]')
          echo "yarn_version=$YARN_VERSION" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6

      - name: Check if release already exists
        id: check-version
        shell: bash
        run: |
          TAG="calcom-v${{ steps.get-versions.outputs.calcom_version }}"
          if git ls-remote --exit-code --tags origin "$TAG" ; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'

    runs-on: ubuntu-latest

    outputs:
      exec_time: ${{ steps.build-calcom.outputs.exec_time }}
      disk_used: ${{ steps.build-calcom.outputs.disk_used }}
      peak_ram: ${{ steps.build-calcom.outputs.peak_ram }}

    env:
      NODE_ENV: production
      NODE_OPTIONS: "--max_old_space_size=8192"
      COREPACK_ENABLE_DOWNLOAD_PROMPT: 0
      CURL_OPTS: "--fail --location --retry 3 --retry-delay 2"
      CALENDSO_ENCRYPTION_KEY: ${{ secrets.CALENDSO_ENCRYPTION_KEY }}
      DATABASE_URL: "postgresql://calcom:${{ secrets.DB_PWD }}@localhost:5432/calcom"
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXT_PUBLIC_WEBAPP_URL: "http://localhost:3000"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_TELEMETRY_DISABLED: "1"
      TURBO_TELEMETRY_DISABLED: "1"

    container:
      image: debian:bookworm

    steps:

      - name: Install git for checkout  
        run: |
          apt-get update
          apt-get install -y curl git build-essential

      - uses: actions/checkout@v6

      - name: Install Node.js (LTS)
        uses: actions/setup-node@v6
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}

      - name: Enable Corepack (Yarn)
        run: |
          corepack enable --install-directory=/usr/local/bin

      - name: Generate dynamic keys (masked)
        id: keygen
        run: |
          # Generate random 32-byte base64 keys
          CAL_KEY=$(openssl rand -base64 32)
          DB_PWD=$(openssl rand -base64 32)
          NEXT_KEY=$(openssl rand -base64 32)

          # Mask the keys in GitHub Actions logs
          echo "::add-mask::$CAL_KEY"
          echo "::add-mask::$DB_PWD"
          echo "::add-mask::$NEXT_KEY"

          # Export the keys to subsequent steps
          echo "CALENDSO_ENCRYPTION_KEY=$CAL_KEY" >> $GITHUB_ENV
          echo "DB_PWD=$DB_PWD" >> $GITHUB_ENV
          echo "NEXTAUTH_SECRET=$NEXT_KEY" >> $GITHUB_ENV

      - name: Build calcom
        id: build-calcom
        shell: bash
        run: |
          set -euxo pipefail

          ######################################################################
          # DIR STRUCTURE
          ######################################################################
          echo "::group::📁 Creating folder structure"
          install_dir="${{ needs.prepare.outputs.install_dir }}"
          mkdir -p "$install_dir"
          echo "::endgroup::"


          ######################################################################
          # STATS START
          ######################################################################
          echo "::group::⏱️ Starting statistics"
          date_before=$(date +%s)
          disk_before=$(df -k / | tail -1 | awk '{print $3}')
          echo "::endgroup::"


          ######################################################################
          # CALCOM SOURCE
          ######################################################################
          echo "::group::📥 Downloading calcom source"
          cd "$install_dir"
          curl $CURL_OPTS -o src.tgz \
            https://github.com/calcom/cal.com/archive/refs/tags/v${{ needs.prepare.outputs.calcom_version }}.tar.gz
          tar xzf src.tgz --strip-components=1
          rm src.tgz
          echo "::endgroup::"


          ######################################################################
          # INSTALL DEPENDENCIES & BUILD
          ######################################################################
          echo "::group::🛠️ Building calcom"
          yarn
          yarn prisma generate
          yarn build
          echo "::endgroup::"

          ######################################################################
          # CLEANUP
          ######################################################################
          echo "::group::🧹 Cleaning"
          echo "Patching package.json to comment out postinstall..."
          # backup original package.json
          cp package.json package.json.bak
          # comment out the postinstall line
          sed -i 's/"postinstall": "husky install && turbo run post-install"/"postinstall": ""/g' package.json
          yarn workspaces focus --all --production
          echo "::endgroup::"

          ######################################################################
          # STATS END
          ######################################################################
          echo "::group::⏱️ Ending statistics"
          date_after=$(date +%s)
          disk_after=$(df -k / | tail -1 | awk '{print $3}')
          dur=$((date_after - date_before))
          if [ -f /sys/fs/cgroup/memory.peak ]; then
            peak=$(cat /sys/fs/cgroup/memory.peak)
          else
            peak=0
          fi
          echo "exec_time=$(printf '%02d:%02d:%02d' $((dur/3600)) $((dur%3600/60)) $((dur%60)))" >> $GITHUB_OUTPUT
          echo "disk_used=$(awk -v a="$disk_after" -v b="$disk_before" 'BEGIN{ printf "%.2fGB",(a-b)/1024/1024 }')" >> $GITHUB_OUTPUT
          echo "peak_ram=$(awk -v v="$peak" 'BEGIN{ printf "%.2fGB",v/1024/1024/1024 }')" >> $GITHUB_OUTPUT
          echo "::endgroup::"

      ##########################################################################
      # TAR CREATION
      ##########################################################################

      - name: 📦 Creating final tarball
        run: |
          echo "::group::📦 Creating final tarball"
          calcom="${{ needs.prepare.outputs.calcom_version }}"
          cd /var/www
          tar czf "calcom-v${calcom}.tar.gz" calcom
          mv calcom-v*.tar.gz /tmp/
          echo "::endgroup::"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: calcom-v${calcom}
          path: /tmp/calcom-v*.tar.gz

  ##########################################################################
  # RELEASE JOB
  ##########################################################################

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.should_build == 'true'

    permissions:
      contents: write

    steps:

      ######################################################################
      # DOWNLOAD ARTIFACTS
      ######################################################################
      - name: 📥 Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts


      ######################################################################
      # CREATE RELEASE
      ######################################################################
      - name: 🚀 Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: calcom-v${{ needs.prepare.outputs.calcom_version }}
          name:     "calcom v${{ needs.prepare.outputs.calcom_version }}"
          files:    artifacts/**/*
          body: |
            ## 🚀 calcom v${{ needs.prepare.outputs.calcom_version }} for YunoHost

            This release was automatically built using the automated build workflow.

            ---

            [Upstream changelog](https://github.com/calcom/cal.com/releases/tag/v${{ needs.prepare.outputs.calcom_version }})

            ---

            ## 📦 Component Versions

            **Source Components**
            - calcom: `${{ needs.prepare.outputs.calcom_version }}`

            **Build Environment**
            - Node.js: `${{ needs.prepare.outputs.node_version }}`
            - Yarn: `${{ needs.prepare.outputs.yarn_version }}`

            ---

            ## 📊 Build Statistics

            - ⏱️ Execution time: `${{ needs.build.outputs.exec_time }}`
            - 🧠 Peak RAM usage: `${{ needs.build.outputs.peak_ram }}`
            - 💾 Disk space used: `${{ needs.build.outputs.disk_used }}`

            ---

            ## 📁 Artifacts

            Compiled artifact is available in the Assets section below.

